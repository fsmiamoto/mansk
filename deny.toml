[graph]
all-features = true

[advisories]
ignore = []

[licenses]
# New license families require an explicit policy review. Keep this list to
# permissive licenses that are suitable for an MIT-licensed command-line tool.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
# The allowlist is intentionally broader than today's graph so common
# permissive licenses do not require ad-hoc CI exceptions.
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

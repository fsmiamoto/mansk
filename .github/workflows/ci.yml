name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Rust 1.97.1
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
          components: rustfmt
      - name: Install Just 1.57.0
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just@1.57.0
          fallback: none
      - name: Check formatting
        run: just fmt-check

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Rust 1.97.1
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
          components: clippy
      - name: Install Just 1.57.0
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just@1.57.0
          fallback: none
      - name: Compile all targets
        run: just compile
      - name: Run strict Clippy
        run: just lint
      - name: Check rustdoc warnings
        run: just docs

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Rust 1.97.1
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
      - name: Install Just 1.57.0
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just@1.57.0
          fallback: none
      - name: Run all tests
        run: just test

  msrv:
    name: Rust 1.85 compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.85.0
      - name: Install Just 1.57.0
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just@1.57.0
          fallback: none
      - name: Check minimum Rust version
        run: just msrv

  dependencies:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Rust 1.97.1
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.97.1
      - name: Install pinned quality tools
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: just@1.57.0,cargo-deny@0.20.2,cargo-machete@0.9.2
          fallback: none
      - name: Check advisories, licenses, sources, and bans
        run: just deny
      - name: Check unused direct dependencies
        run: just unused-deps
